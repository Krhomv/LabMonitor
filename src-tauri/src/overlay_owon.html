<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabMonitor - Multimeter Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    font-family: 'Inter', sans-serif;
    color: #fff;
    user-select: none;
    overflow: hidden;
  }
  .card {
    background: var(--device-bg, rgba(20,20,20,0.7));
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 15px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 12px;
    display: inline-block;
    min-width: 360px;
  }
  .card-inner { display: flex; flex-direction: column; gap: 12px; }
  .card-header { display: flex; align-items: center; gap: 8px; }
  .indicator { width: 8px; height: 8px; border-radius: 50%; transition: background-color 0.3s; }
  .indicator.on { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
  .indicator.off { background-color: #ef4444; }
  .card-header span { font-size: 11px; font-weight: 700; color: #777; letter-spacing: 0.5px; }
  .line { flex-grow: 1; height: 1px; background: linear-gradient(90deg, #333, transparent); margin-left: 5px; }
  .modes-grid { display: flex; flex-direction: column; gap: 4px; }
  .modes-row { display: flex; gap: 4px; justify-content: center; }
  .mode-chip {
    flex: 1; padding: 6px; background: #000; border: 1px solid #222;
    border-radius: 4px; height: 34px; text-align: center;
    color: #888; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .mode-chip.active { color: #fff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
  .display-area { display: flex; align-items: flex-start; justify-content: center; padding-top: 10px; }
  .value-container {
    display: flex; align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 60px; font-weight: 700; line-height: 1; white-space: pre;
  }
  .sign { width: 35px; text-align: right; margin-right: -5px; }
  .unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px; margin-left: 5px; color: inherit;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="card-inner">
    <div class="card-header">
      <div class="indicator off" id="indicator"></div>
      <span>MULTIMETER</span>
      <div class="line"></div>
    </div>
    <div class="modes-grid">
      <div class="modes-row" id="modes-row-1"></div>
      <div class="modes-row" id="modes-row-2"></div>
    </div>
    <div class="display-area">
      <div class="value-container" id="value-container">
        <span class="sign" id="sign"> </span>
        <span class="value" id="value">0.0000</span>
      </div>
      <div class="unit" id="unit">VDC</div>
    </div>
  </div>
</div>
<script>
const S = 'stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"';
const MODE_ICONS = {
  "VOLT": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 4 7 L 8 17 L 12 7" /><path d="M 15 10 H 22 M 15 14 H 16.5 M 17.75 14 H 19.25 M 20.5 14 H 22" /></svg>`,
  "VOLT AC": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 4 7 L 8 17 L 12 7" /><path d="M 15 12 Q 16.75 8.5 18.5 12 T 22 12" /></svg>`,
  "CURR": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 4 17 L 8 7 L 12 17 M 5.5 13 H 10.5" /><path d="M 15 10 H 22 M 15 14 H 16.5 M 17.75 14 H 19.25 M 20.5 14 H 22" /></svg>`,
  "CURR AC": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 4 17 L 8 7 L 12 17 M 5.5 13 H 10.5" /><path d="M 15 12 Q 16.75 8.5 18.5 12 T 22 12" /></svg>`,
  "RES": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 4.5 17 H 8.5 C 7.5 15.5 7 13.5 7 11 A 5 5 0 1 1 17 11 C 17 13.5 16.5 15.5 15.5 17 H 19.5" /></svg>`,
  "CONT": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 9 12 A 0.5 0.5 0 1 1 8 12 A 0.5 0.5 0 1 1 9 12" fill="currentColor" stroke="none" /><path d="M 12 9.5 A 3.5 3.5 0 0 1 12 14.5" /><path d="M 15 7 A 7 7 0 0 1 15 17" /><path d="M 18 4.5 A 10.5 10.5 0 0 1 18 19.5" /></svg>`,
  "DIOD": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 3 12 H 9 M 17 12 H 21" /><path d="M 9 7 L 17 12 L 9 17 Z" /><path d="M 17 7 V 17" /></svg>`,
  "CAP": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 10 6 V 18 M 14 6 V 18 M 4 12 H 10 M 14 12 H 20" /></svg>`,
  "FREQ": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 4 7 V 17 M 11 7 V 17 M 4 12 H 11" /><path d="M 14 11 H 20 L 14 17 H 20" /></svg>`,
  "TEMP": `<svg width="18" height="18" viewBox="0 0 24 24" ${S}><path d="M 10 14.5 V 6 A 2 2 0 0 1 14 6 V 14.5 A 4 4 0 1 1 10 14.5 Z" /><path d="M 12 11 V 17" /></svg>`
};

const MODES_1 = ["VOLT", "VOLT AC", "CURR", "CURR AC", "RES"];
const MODES_2 = ["CONT", "DIOD", "CAP", "FREQ", "TEMP"];

function buildModeChips() {
  const r1 = document.getElementById("modes-row-1");
  const r2 = document.getElementById("modes-row-2");
  MODES_1.forEach(key => {
    const d = document.createElement("div");
    d.className = "mode-chip";
    d.dataset.mode = key;
    d.innerHTML = MODE_ICONS[key] || key;
    r1.appendChild(d);
  });
  MODES_2.forEach(key => {
    const d = document.createElement("div");
    d.className = "mode-chip";
    d.dataset.mode = key;
    d.innerHTML = MODE_ICONS[key] || key;
    r2.appendChild(d);
  });
}
buildModeChips();

async function poll() {
  try {
    const res = await fetch("/api/state");
    const data = await res.json();
    const owon = data.owon;
    const cfg = data.config;

    // Indicator
    document.getElementById("indicator").className = "indicator " + (owon.is_communicating ? "on" : "off");

    // Mode chips
    document.querySelectorAll(".mode-chip").forEach(chip => {
      const isActive = chip.dataset.mode === owon.mode;
      chip.className = "mode-chip" + (isActive ? " active" : "");
      if (isActive) {
        chip.style.borderColor = cfg.accent_color;
        chip.style.backgroundColor = cfg.accent_color + "33";
      } else {
        chip.style.borderColor = "#222";
        chip.style.backgroundColor = "#000";
      }
    });

    // Red alert logic
    const isRedAlert = (owon.mode === "CONT" && owon.unit === "Ω" && owon.raw_float < 50.0) ||
                       (owon.mode === "DIOD" && owon.unit === "V" && owon.raw_float < 0.2);
    const fontColor = isRedAlert ? "#ef4444" : cfg.font_color;

    // Value
    const vc = document.getElementById("value-container");
    vc.style.color = fontColor;
    vc.style.textShadow = "0 0 15px " + fontColor + "33";
    document.getElementById("sign").textContent = owon.value ? owon.value.charAt(0) : " ";
    document.getElementById("value").textContent = owon.value ? owon.value.slice(1) : "0.0000";
    const unitEl = document.getElementById("unit");
    unitEl.textContent = owon.unit || "VDC";
    unitEl.style.color = fontColor;

    // Card background
    document.getElementById("card").style.background = cfg.device_bg_color || "rgba(20,20,20,0.7)";
  } catch(e) { /* silently retry */ }
}

setInterval(poll, 150);
poll();
</script>
</body>
</html>
